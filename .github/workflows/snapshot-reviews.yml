name: Snapshot Reviews

on:
  # 毎日 23:00 JST（14:00 UTC）に自動実行
  schedule:
    - cron: "0 14 * * *"
  # 手動実行（初回セットアップや再取得時）
  workflow_dispatch:
    inputs:
      snapshot_name:
        description: "カスタムファイル名（例: baseline-20260327）。空欄なら当日YYYY-MM-DD"
        required: false
        default: ""

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Take snapshot (dated)
        run: node scripts/snapshot-reviews.js
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          # 手動入力があればそれを使用、なければ当日YYYY-MM-DD
          SNAPSHOT_NAME: ${{ github.event.inputs.snapshot_name || '' }}

      - name: Update current.json (nurseries + competitors)
        run: node scripts/snapshot-reviews.js
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          INCLUDE_COMPETITORS: "true"

      - name: Commit and push snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: snapshot reviews $(date +'%Y-%m') [skip ci]"
          file_pattern: "public/snapshots/*.json"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

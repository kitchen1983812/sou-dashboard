name: Snapshot Reviews

on:
  # 毎月1日 23:00 JST（14:00 UTC）に自動実行
  schedule:
    - cron: "0 14 1 * *"
  # 手動実行（初回セットアップや再取得時）
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Take snapshot
        run: node scripts/snapshot-reviews.js
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Commit and push snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: snapshot reviews $(date +'%Y-%m') [skip ci]"
          file_pattern: "public/snapshots/*.json"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
